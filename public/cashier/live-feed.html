<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live Feed – Auction</title>
  <link rel="stylesheet" href="/styles/admin-styles.css" />
  <style>
    /* tiny inline additions */
    #status.ok    { color: green; }
    #status.stale { color: darkorange; }
    tr[data-paddle] { transition: background 0.2s; }
    tr.unsold-row {   color: #777; }
    .refresh-controls {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: 12px;
    }
    #btnRefresh {
      padding: 6px 10px;
      cursor: pointer;
    }
    #refreshCountdown {
      color: #555;
      font-size: 0.95rem;
      white-space: nowrap;
      min-width: 9ch;
    }
  </style>
</head>
<body>
  <header>
    <h1></h1>
</header>

  <div class="toolbar">
    <label>Filter Paddle #:
      <input id="filter" type="number" min="1" max="999" />
    </label>
    <button id="btnApply">Go</button>
    <span id="status" class="ok">Connected</span>
    <span class="refresh-controls">
      <button id="btnRefresh" type="button">Refresh now</button>
      <span id="refreshCountdown" aria-live="polite">Next refresh: --</span>
    </span>

    <label style="margin-left:8px;">
      <input type="checkbox" id="showUnsold" checked>
      Show unsold
    </label>
  </div>

  <table id="feed" class="datatable">
    <thead>
      <tr><th>Paddle #</th><th>Lot</th><th>Title (hover to preview)</th><th>Price</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="/scripts/hover-photo.js"></script>
  <script src="/scripts/live-feed.js"></script>
  <script src="/scripts/banner.js"></script>
  <footer>
    <p>Developed by Chris Staples ("Coastie") for Festival of Friendship <span title="Hoers">🐴</span></p>
</footer>
</body>
</html>
